name: Publish prototype

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    if: startsWith(github.head_ref, 'prototype/')
    runs-on: ubuntu-latest
    steps:
      - name: Create or update prototype branch
        run: |
          # Try to update existing branch, fall back to creating it
          gh api "repos/${{ github.repository }}/git/refs/heads/${{ github.head_ref }}" \
            --method PATCH \
            --field sha="${{ github.event.pull_request.head.sha }}" \
            --field force=true 2>/dev/null || \
          gh api "repos/${{ github.repository }}/git/refs" \
            --method POST \
            --field ref="refs/heads/${{ github.head_ref }}" \
            --field sha="${{ github.event.pull_request.head.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close PR
        run: gh pr close ${{ github.event.pull_request.number }} --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
